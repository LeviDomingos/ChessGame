<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Chess Game By EdenTech</title>
        <link rel="stylesheet" href="./static/css/styleSheet.css">
    </head>

    <body>
        <header> 
            <div class="dots red-dot"></div>
            <div class="dots yellow-dot"></div>
            <h1>Welcome to Chess Game</h1>
            <div class="dots yellow-dot"></div>
            <div class="dots red-dot"></div>
        </header>

        <nav>
            <div class="nav-menu">
                <div> 
                    <ul>
                        <li>
                            <a id="home" href="#">Home</a>
                        </li>
                    </ul>
                </div>

                <div>
                    <h4> </h4>
                </div>
            </div>
        </nav>

        <main class="board-game">
            <div class="left-side-menu">
                <!-- <div>
                    <button>Load Game</button>
                </div>
                -->
                <div> 
                    <fieldset> 
                        <legend>Select Piece To Play With</legend>
                        <div>
                            <input type="radio" id="whitePiece" name="chess" value="white" unchecked>
                            <label for="whitePiece">White Piece</label>
                        </div>
                        <br>
                        <div>
                            <input type="radio" id="blackPiece" name="chess" value="white" unchecked>
                            <label for="blackPiece">Black Piece</label>
                        </div>
                    </fieldset>
                </div>
            </div>

            <div id ="game" class= ""> </div>
            
            <div class = "right-side-menu">
                <div id ="firstPiece" class= "">
                    
                </div>
                
                <div id ="secondPiece" class =""> 
                </div>
               
                <div class="pointclass">Total Point:<span id="points" ></span></div>
                
            </div>

        </main>

        <footer>

        </footer>
        <script type="module" src= "script.js"></script>

    </body>
</html>
